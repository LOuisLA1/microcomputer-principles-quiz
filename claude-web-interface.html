<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code Web 界面</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }

        .main-content {
            display: flex;
            min-height: 600px;
        }

        .sidebar {
            width: 300px;
            background: #f8f9fa;
            border-right: 1px solid #e9ecef;
            padding: 30px;
        }

        .content {
            flex: 1;
            padding: 40px;
        }

        .section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #495057;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e9ecef;
        }

        /* 文件选择器样式 */
        .file-selector {
            border: 2px dashed #dee2e6;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
            background: white;
        }

        .file-selector:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .file-selector i {
            font-size: 3rem;
            color: #667eea;
            margin-bottom: 15px;
            display: block;
        }

        .selected-path {
            background: #e7f4e4;
            border: 1px solid #d4edda;
            border-radius: 8px;
            padding: 15px;
            margin-top: 10px;
            font-family: monospace;
            word-break: break-all;
        }

        /* 技能选择器样式 */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .skill-card {
            background: white;
            border: 1px solid #e9ecef;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .skill-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-color: #667eea;
        }

        .skill-card.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #f8f9ff 0%, #f0f3ff 100%);
            border-width: 2px;
        }

        .skill-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 15px;
        }

        .skill-title {
            font-weight: 600;
            margin-bottom: 8px;
            color: #495057;
            font-size: 1.1rem;
        }

        .skill-desc {
            color: #6c757d;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        /* 控制面板 */
        .control-panel {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-top: 30px;
        }

        .status-area {
            background: white;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.9rem;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.2);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-large {
            padding: 18px 40px;
            font-size: 1.2rem;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
        }

        .instructions {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .instructions h3 {
            color: #856404;
            margin-bottom: 10px;
        }

        .instructions ol {
            margin-left: 20px;
            line-height: 1.6;
        }

        .instructions li {
            margin-bottom: 8px;
        }

        /* 会话历史 */
        .history-panel {
            margin-top: 30px;
            border-top: 1px solid #e9ecef;
            padding-top: 30px;
        }

        .message {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .message.user {
            background: #e3f2fd;
            margin-left: 40px;
        }

        .message.assistant {
            background: #f3e5f5;
            margin-right: 40px;
        }

        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid #e9ecef;
            }

            .skills-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 Claude Code Web 界面</h1>
            <p>可视化管理和使用 Claude Code 技能</p>
        </div>

        <div class="main-content">
            <div class="sidebar">
                <div class="section">
                    <div class="section-title">📁 项目选择</div>
                    <div class="file-selector" id="fileSelector">
                        <i>📂</i>
                        <div>点击选择工作目录</div>
                        <div style="font-size: 0.9rem; color: #6c757d; margin-top: 10px;">
                            选择要操作的文件夹或项目
                        </div>
                    </div>
                    <div id="selectedPath" class="selected-path" style="display: none;">
                        <strong>已选择:</strong> <span id="pathText"></span>
                    </div>
                </div>

                <div class="control-panel">
                    <div class="section-title">⚙️ 控制面板</div>
                    <div id="statusArea" class="status-area">
                        状态: 等待操作...
                    </div>

                    <div id="commandArea" class="selected-path" style="display: none; margin: 15px 0;">
                        <strong>生成的命令:</strong><br>
                        <code id="commandText" style="display: block; margin-top: 5px; padding: 8px; background: #f8f9fa; border-radius: 4px;"></code>
                        <button class="btn" id="copyBtn" style="margin-top: 10px; padding: 8px 15px; font-size: 0.9rem;">
                            📋 复制命令到剪贴板
                        </button>
                    </div>

                    <button class="btn btn-large" id="executeBtn" disabled>
                        🚀 执行技能
                    </button>

                    <button class="btn btn-secondary" id="resetBtn" style="margin-top: 10px;">
                        🔄 重置选择
                    </button>
                </div>

                <div class="instructions">
                    <h3>📖 使用说明</h3>
                    <ol>
                        <li>点击上方选择您的工作目录</li>
                        <li>从右侧选择一个要使用的技能</li>
                        <li>点击"执行技能"按钮开始操作</li>
                        <li>在终端中查看完整交互过程</li>
                    </ol>
                </div>
            </div>

            <div class="content">
                <div class="section">
                    <div class="section-title">🛠️ 可用技能</div>
                    <div class="skills-grid" id="skillsGrid">
                        <!-- 技能卡片会通过JavaScript动态生成 -->
                    </div>
                </div>

                <div class="history-panel">
                    <div class="section-title">💬 会话历史</div>
                    <div id="historyArea">
                        <div class="message assistant">
                            <strong>系统：</strong> Web界面已就绪，请选择工作目录和技能。
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="folderInput" webkitdirectory multiple style="display: none;">

    <script>
        // 技能数据
        const skills = [
            {
                id: 'brainstorming',
                icon: '💡',
                title: '创意规划',
                description: '在开始创意工作前探索需求、设计规划'
            },
            {
                id: 'writing-plans',
                icon: '📝',
                title: '编写计划',
                description: '为多步骤任务编写详细实施计划'
            },
            {
                id: 'test-driven-development',
                icon: '🧪',
                title: '测试驱动开发',
                description: '先编写测试，然后实现功能'
            },
            {
                id: 'using-git-worktrees',
                icon: '🌳',
                title: 'Git工作树',
                description: '创建隔离的工作空间进行功能开发'
            },
            {
                id: 'simplify',
                icon: '✨',
                title: '代码优化',
                description: '审查代码质量，优化可重用性和效率'
            },
            {
                id: 'verification-before-completion',
                icon: '✅',
                title: '验证检查',
                description: '在声称完成前验证工作质量'
            },
            {
                id: 'systematic-debugging',
                icon: '🐛',
                title: '系统调试',
                description: '系统化诊断和修复错误'
            },
            {
                id: 'requesting-code-review',
                icon: '👁️',
                title: '请求代码审查',
                description: '完成任务后请求代码质量审查'
            },
            {
                id: 'receiving-code-review',
                icon: '📋',
                title: '接收代码审查',
                description: '处理代码审查反馈和建议'
            },
            {
                id: 'finishing-a-development-branch',
                icon: '🏁',
                title: '完成开发分支',
                description: '完成开发工作，准备集成'
            }
        ];

        // 状态变量
        let selectedSkill = null;
        let selectedPath = null;

        // DOM元素
        const fileSelector = document.getElementById('fileSelector');
        const folderInput = document.getElementById('folderInput');
        const pathText = document.getElementById('pathText');
        const selectedPathDiv = document.getElementById('selectedPath');
        const skillsGrid = document.getElementById('skillsGrid');
        const executeBtn = document.getElementById('executeBtn');
        const resetBtn = document.getElementById('resetBtn');
        const statusArea = document.getElementById('statusArea');
        const historyArea = document.getElementById('historyArea');

        // 初始化技能卡片
        function initSkills() {
            skillsGrid.innerHTML = '';
            skills.forEach(skill => {
                const card = document.createElement('div');
                card.className = 'skill-card';
                card.innerHTML = `
                    <div class="skill-icon">${skill.icon}</div>
                    <div class="skill-title">${skill.title}</div>
                    <div class="skill-desc">${skill.description}</div>
                `;

                card.addEventListener('click', () => {
                    selectSkill(skill);
                });

                skillsGrid.appendChild(card);
            });
        }

        // 选择技能
        function selectSkill(skill) {
            // 移除之前的选中状态
            document.querySelectorAll('.skill-card').forEach(card => {
                card.classList.remove('selected');
            });

            // 添加当前选中状态
            const selectedCard = Array.from(document.querySelectorAll('.skill-card'))
                .find(card => card.querySelector('.skill-title').textContent === skill.title);
            if (selectedCard) {
                selectedCard.classList.add('selected');
            }

            selectedSkill = skill;
            updateStatus();
            addToHistory('assistant', `已选择技能: ${skill.title} (${skill.id})`);
        }

        // 选择文件夹
        fileSelector.addEventListener('click', () => {
            folderInput.click();
        });

        folderInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                // 使用第一个文件的路径推断文件夹（因为webkitdirectory会选择文件夹内的所有文件）
                const filePath = e.target.files[0].webkitRelativePath || e.target.files[0].path;
                const folderPath = filePath.split('/').slice(0, -1).join('/') || filePath;

                // 如果无法推断，使用文件所在目录
                const fullPath = e.target.files[0].path;
                selectedPath = fullPath.substring(0, fullPath.lastIndexOf('\\') + 1);

                pathText.textContent = selectedPath;
                selectedPathDiv.style.display = 'block';
                updateStatus();
                addToHistory('assistant', `已选择目录: ${selectedPath}`);
            }
        });

        // 更新状态
        function updateStatus() {
            let statusText = '状态: ';
            const commandArea = document.getElementById('commandArea');
            const commandText = document.getElementById('commandText');

            if (!selectedPath) {
                statusText += '请选择工作目录';
                executeBtn.disabled = true;
                commandArea.style.display = 'none';
            } else if (!selectedSkill) {
                statusText += '请选择要使用的技能';
                executeBtn.disabled = true;
                commandArea.style.display = 'none';
            } else {
                statusText += `准备执行 ${selectedSkill.title} 在 ${selectedPath}`;
                executeBtn.disabled = false;

                // 显示生成的命令
                const command = `cd "${selectedPath}" && /${selectedSkill.id}`;
                commandText.textContent = command;
                commandArea.style.display = 'block';
            }

            statusArea.textContent = statusText;
        }

        // 执行技能
        executeBtn.addEventListener('click', async () => {
            statusArea.textContent = '正在准备执行...';
            executeBtn.disabled = true;

            // 模拟执行过程
            addToHistory('user', `执行 ${selectedSkill.title} (${selectedSkill.id})`);

            // 这里在实际应用中会连接到后端API来执行真正的Claude Code命令
            setTimeout(() => {
                addToHistory('assistant', `技能 ${selectedSkill.title} 已启动`);
                addToHistory('assistant', `请返回Claude Code终端查看完整交互过程\n命令: cd "${selectedPath}" ; /${selectedSkill.id}`);
                statusArea.textContent = `技能 ${selectedSkill.title} 已准备就绪！`;
                executeBtn.disabled = false;
            }, 1000);
        });

        // 重置选择
        resetBtn.addEventListener('click', () => {
            selectedSkill = null;
            selectedPath = null;

            document.querySelectorAll('.skill-card').forEach(card => {
                card.classList.remove('selected');
            });

            pathText.textContent = '';
            selectedPathDiv.style.display = 'none';
            folderInput.value = '';
            updateStatus();
            addToHistory('assistant', '已重置所有选择');
        });

        // 添加到历史记录
        function addToHistory(type, message) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.innerHTML = `<strong>${type === 'user' ? '您' : 'Claude'}:</strong> ${message}`;
            historyArea.appendChild(messageDiv);
            historyArea.scrollTop = historyArea.scrollHeight;
        }

        // 初始化
        initSkills();
        updateStatus();

        // 添加键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                if (!executeBtn.disabled) {
                    executeBtn.click();
                }
            }
            if (e.key === 'Escape') {
                resetBtn.click();
            }
        });
    </script>
</body>
</html>
